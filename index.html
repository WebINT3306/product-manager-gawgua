<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Quản lý Sản phẩm</title>
	</head>
	<body>
		<table id="product-table">
			<thead>
				<tr>
					<th>STT</th>
					<th id="name">Tên sản phẩm</th>
					<th>Danh mục</th>
					<th>Đơn giá</th>
					<th>Số lượng</th>
				</tr>
			</thead>
			<tbody>
			</tbody>
		</table>

		<form id="add-product-form">
			<input id="input-name" placeholder="Tên" />
			<input id="input-category" placeholder="Danh mục" />
			<input id="input-price" placeholder="Đơn giá" />
			<input id="input-quantity" placeholder="Số lượng" />
			<button id="btn-add" type="submit">Thêm</button>
		</form>

		<script>
			function getTbody() {
				return document.querySelector("tbody");
			}

			function getCellText(tr, index) {
				var cells = tr.querySelectorAll("td");
				return cells[index] ? cells[index].textContent : "";
			}

			function addRowToTable(id, name, category, price, quantity) {
				var tr = document.createElement("tr");
				var idTd = document.createElement("td");
				idTd.textContent = id;
				var nameTd = document.createElement("td");
				nameTd.textContent = name;
				var categoryTd = document.createElement("td");
				categoryTd.textContent = category || "";
				var priceTd = document.createElement("td");
				priceTd.textContent = price;
				var quantityTd = document.createElement("td");
				quantityTd.textContent = quantity;

				tr.appendChild(idTd);
				tr.appendChild(nameTd);
				tr.appendChild(categoryTd);
				tr.appendChild(priceTd);
				tr.appendChild(quantityTd);

				getTbody().appendChild(tr);
			}

			var xhr = new XMLHttpRequest();
			xhr.onreadystatechange = function () {
				if (xhr.readyState === 4 && xhr.status === 200) {
					var products = JSON.parse(xhr.responseText);
					getTbody().innerHTML = "";
					products.forEach(function (element) {
						addRowToTable(element.id, element.name, element.category, element.price, element.quantity);
					});
				}
			};
			xhr.open("GET", "products.json");
			xhr.send();

			var ascending_name_order = true;
			var nameHeader = document.getElementById("name");
			nameHeader.addEventListener("click", function () {
				ascending_name_order = !ascending_name_order;
				var tbody = getTbody();
				var rows = Array.from(document.querySelectorAll("tbody tr"));
				rows.sort(function (a, b) {
					var nameA = getCellText(a, 1).toLowerCase();
					var nameB = getCellText(b, 1).toLowerCase();
					if (nameA < nameB) return ascending_name_order ? -1 : 1;
					if (nameA > nameB) return ascending_name_order ? 1 : -1;
					return 0;
				});
				rows.forEach(function (tr) { tbody.removeChild(tr); });
				rows.forEach(function (tr) { tbody.appendChild(tr); });
			});

			function handleAddProduct(e) {
				if (e && e.preventDefault) e.preventDefault();
				var name = document.getElementById("input-name").value;
				var category = document.getElementById("input-category").value;
				var price = document.getElementById("input-price").value;
				var quantity = document.getElementById("input-quantity").value;

				if (name && price && quantity) {
					var id = document.querySelectorAll("tbody tr").length + 1;
					addRowToTable(id, name, category, price, quantity);
					document.getElementById("input-name").value = "";
					document.getElementById("input-category").value = "";
					document.getElementById("input-price").value = "";
					document.getElementById("input-quantity").value = "";
				} else {
					alert("Vui lòng điền đầy đủ thông tin sản phẩm.");
				}
				return false;
			}

			document.getElementById("btn-add").addEventListener("click", handleAddProduct);
			document.getElementById("add-product-form").addEventListener("submit", handleAddProduct);
		</script>
	</body>
</html>
