<!doctype html>
<html lang="vi">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Quản lý Sản phẩm</title>
	</head>
	<body>
		<table id="product-table">
			<thead>
				<tr>
					<th>STT</th>
					<th id="name">Tên sản phẩm</th>
					<th>Danh mục</th>
					<th>Đơn giá</th>
					<th>Số lượng</th>
				</tr>
			</thead>
			<tbody>
				<tr>
					<td>1</td>
					<td>May giat</td>
					<td>Dien gia dung</td>
					<td>8500000</td>
					<td>5</td>
				</tr>
				<tr>
					<td>2</td>
					<td>Dieu hoa</td>
					<td>Dien gia dung</td>
					<td>12000000</td>
					<td>3</td>
				</tr>
				<tr>
					<td>3</td>
					<td>Tu lanh</td>
					<td>Dien gia dung</td>
					<td>9000000</td>
					<td>7</td>
				</tr>
				<tr>
					<td>4</td>
					<td>Laptop</td>
					<td>Dien tu</td>
					<td>15000000</td>
					<td>10</td>
				</tr>
				<tr>
					<td>5</td>
					<td>Dien thoai</td>
					<td>Dien tu</td>
					<td>7500000</td>
					<td>15</td>
				</tr>
				<tr>
					<td>6</td>
					<td>May tinh bang</td>
					<td>Dien tu</td>
					<td>6000000</td>
					<td>8</td>
				</tr>
			</tbody>
		</table>

		<form id="add-product-form">
			<input id="input-name" placeholder="Tên" />
			<input id="input-category" placeholder="Danh mục" />
			<input id="input-price" placeholder="Đơn giá" />
			<input id="input-quantity" placeholder="Số lượng" />
			<button id="btn-add" type="submit">Thêm</button>
		</form>

		<script>
			// AJAX get products.json
			const xhr = new XMLHttpRequest();
			xhr.onreadystatechange = function () {
				if (xhr.status === 200 && xhr.readyState === 4) {
					const products = JSON.parse(xhr.responseText);
					document.querySelector("tbody").innerHTML = ""; // Clear existing rows
					products.forEach((element) => {
						let tr = document.createElement("tr");
						let id = document.createElement("td");
						id.textContent = element.id;
						let name = document.createElement("td");
						name.textContent = element.name;
						let category = document.createElement("td");
						category.textContent = element.category;
						let price = document.createElement("td");
						price.textContent = element.price;
						let quantity = document.createElement("td");
						quantity.textContent = element.quantity;

						tr.appendChild(id);
						tr.appendChild(name);
						tr.appendChild(category);
						tr.appendChild(price);
						tr.appendChild(quantity);

						document.querySelector("tbody").appendChild(tr);
					});
				} else {
					console.error("Failed to load products.json");
				}
			};
			xhr.open("GET", "products.json");
			xhr.send();

			let ascending_name_order = true;
			const nameHeader = document.getElementById("name");
			nameHeader.onclick = () => {
				ascending_name_order = !ascending_name_order;
				let rows = Array.from(document.querySelectorAll("tbody tr"));
				rows.forEach((tr) => tr.parentNode.removeChild(tr));
				rows.sort((a, b) => {
					const nameA = a.children[1].textContent.toLowerCase();
					const nameB = b.children[1].textContent.toLowerCase();
					if (nameA < nameB) return ascending_name_order ? -1 : 1;
					if (nameA > nameB) return ascending_name_order ? 1 : -1;
					return 0;
				});

				rows.forEach((tr) =>
					document.querySelector("tbody").appendChild(tr),
				);
			};

			const form = document.getElementById("add-product-form");
			form.onsubmit = () => {
				const name = document.getElementById("input-name").value;
				const category =
					document.getElementById("input-category").value;
				const price = document.getElementById("input-price").value;
				const quantity =
					document.getElementById("input-quantity").value;

				if (name && price && quantity) {
					let tr = document.createElement("tr");
					let id = document.createElement("td");
					id.textContent =
						document.querySelectorAll("tbody tr").length + 1;
					let nameTd = document.createElement("td");
					nameTd.textContent = name;
					let categoryTd = document.createElement("td");
					categoryTd.textContent = category ?? "";
					let priceTd = document.createElement("td");
					priceTd.textContent = price;
					let quantityTd = document.createElement("td");
					quantityTd.textContent = quantity;

					tr.appendChild(id);
					tr.appendChild(nameTd);
					tr.appendChild(categoryTd);
					tr.appendChild(priceTd);
					tr.appendChild(quantityTd);

					document.querySelector("tbody").appendChild(tr);

					form.reset();
				} else {
					alert("Vui lòng điền đầy đủ thông tin sản phẩm.");
				}

				return false; // Prevent reload
			};
		</script>
	</body>
</html>
